# HTTP only - used before SSL certificates are available
# Once Certbot creates the certificate, nginx will reload with the full HTTPS config.
server {
    listen 80;
    listen [::]:80;
    server_name {MY_DOMAIN};

    # Required for Certbot webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
